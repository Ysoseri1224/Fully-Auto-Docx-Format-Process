name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build WriteMaster
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build single-file bundle
        run: npm run bundle

      - name: Build Electron (setup + portable)
        run: npx electron-builder --win --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust wrapper
        run: cargo build --manifest-path rust-wrapper/Cargo.toml --release

      - name: Upload Rust artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          files: rust-wrapper/target/release/writemaster-rs.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
